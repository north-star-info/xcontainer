name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install packages
        run: npm install

      - name: Install iOS stuff
        run: |
          cd ios
          pod install

      - name: Build app
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
          -scheme $(ls ios | grep .xcodeproj | sed 's/.xcodeproj//') \
          -sdk iphoneos \
          -configuration Release \
          archive -archivePath build/App.xcarchive

      - name: Make IPA
        run: |
          mkdir build/ipa
          xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportPath build/ipa \
          -exportOptionsPlist ios/ExportOptions.plist || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa
          path: build/ipa
