name: Generate iOS Folder

on:
  workflow_dispatch:

jobs:
  generate-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JS dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Ensure Expo is installed in project
        run: |
          if ! npm list expo >/dev/null 2>&1; then
            npm install expo
          fi

      - name: Run Expo Prebuild (iOS)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Verify iOS folder exists
        run: |
          if [ ! -d "ios" ]; then
            echo "❌ iOS folder was NOT created"
            exit 1
          fi

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Commit generated iOS folder
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ios
          git commit -m "Add generated iOS folder" || echo "No changes to commit"
          git push
